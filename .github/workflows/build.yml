name: Build TrackHook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      THEOS: /Users/runner/theos
      TARGET_SDK_PATH: $(THEOS)/sdks
      _THEOS_PLATFORM_DPKG_DEB_COMPRESSION: gzip

    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 配置Xcode官方编译环境
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: 安装Theos编译必需依赖（极简版，无重试）
        run: |
          # 适配Intel/Apple Silicon双架构brew路径
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

          # 核心修复：仅安装真正缺失的包，跳过已安装的，避免brew返回非零退出码
          if ! command -v dpkg &> /dev/null; then
            echo "Installing dpkg..."
            brew install dpkg
          fi
          
          if ! command -v ldid &> /dev/null; then
            echo "Installing ldid..."
            brew install ldid
          fi
          
          if ! command -v xz &> /dev/null; then
            echo "Installing xz..."
            brew install xz
          fi

          # 强制校验核心工具，必须全部存在才继续
          for tool in dpkg ldid xz make gzip; do
            if ! command -v $tool &> /dev/null; then
              echo "FATAL: $tool is missing!"
              exit 1
            fi
          done

          # 输出工具版本确认
          echo "=== 核心工具就绪 ==="
          dpkg --version
          ldid --version
          xz --version

      - name: 安装Theos编译环境（修复克隆重试逻辑）
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 600
          git config --global core.compression 0

          rm -rf $THEOS

          for i in 1 2 3; do
            echo "Theos clone attempt $i/3"
            git clone --recursive --depth 1 --shallow-submodules https://github.com/theos/theos.git $THEOS && break
            rm -rf $THEOS
            echo "Theos clone failed, retrying in 5s..."
            sleep 5
          done

          if [ ! -d "$THEOS/bin" ]; then
            echo "FATAL: Theos install failed!"
            exit 1
          fi

          chmod +x $THEOS/bin/*
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: 安装iOS 16.5 SDK（匹配您的手机系统）
        run: |
          rm -rf $THEOS/sdks

          for i in 1 2 3; do
            echo "SDK clone attempt $i/3"
            git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks && break
            rm -rf $THEOS/sdks
            echo "SDK clone failed, retrying in 5s..."
            sleep 5
          done

          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ]; then
            echo "FATAL: iPhoneOS16.5.sdk not found!"
            exit 1
          fi

          echo "=== 可用SDK列表 ==="
          ls -la $THEOS/sdks/ | grep .sdk

      - name: 清理旧编译缓存（完全容错）
        run: |
          make clean 2>/dev/null || true
          rm -rf .theos packages 2>/dev/null || true
          echo "旧编译缓存清理完成"

      - name: 编译并打包Tweak
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$THEOS/bin:$PATH"
          export THEOS=$THEOS

          make package FINALPACKAGE=1 CODESIGN_IPA=0 V=1

          if [ ! -f packages/*.deb ]; then
            echo "FATAL: 编译失败，未生成deb安装包"
            exit 1
          fi

          echo "=== 编译成功！生成安装包 ==="
          ls -la packages/*.deb

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_iOS16.5_DEB
          path: packages/*.deb
          if-no-files-found: error
