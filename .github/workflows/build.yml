name: 编译 TrackHook 插件
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 🔥 核心修复：使用专用Theos编译Action（内置SDK，无网络报错）
      - name: 配置 Theos 编译环境
        uses: yiichris/Make-Theos@main
        with:
          theos-version: 'latest'

      - name: 清理并编译插件
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: 上传 DEB 安装包
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_Deb
          path: packages/*.deb
