name: Build TrackHook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Package
        run: |
          make package FINALPACKAGE=1 CODESIGN_IPA=0

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_DEB
          path: packages/*.deb
