name: 编译 TrackHook 插件
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置环境变量
        run: |
          echo "THEOS=${HOME}/theos" >> $GITHUB_ENV
          echo "PATH=${HOME}/theos/bin:$PATH" >> $GITHUB_ENV
          echo "HOMEBREW_NO_REQUIRE_TAP_TRUST=1" >> $GITHUB_ENV

      - name: 安装依赖 + Theos
        run: |
          brew install ldid dos2unix
          dos2unix control
          git clone --recursive https://github.com/theos/theos.git $THEOS
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 编译打包 deb
        run: |
          set -e
          make clean
          make package FINALPACKAGE=1
          # 给生成的包文件补上 .deb 后缀
          for f in packages/*; do
            if [ -f "$f" ] && [[ "$f" != *.deb ]]; then
              mv "$f" "${f}.deb"
            fi
          done
          # 打印最终产物确认
          echo "===== 最终产物 ====="
          ls -la packages/

      - name: 上传DEB插件包
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_成品插件
          path: packages/*.deb
