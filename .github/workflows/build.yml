name: Build TrackHook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node.js 20 弃用警告

    steps:
      - name: Checkout
        uses: actions/checkout@v6  # 升级到支持Node.js24的最新版本

      - name: Setup Theos
        run: |
          # 优化Git网络配置，调大传输缓冲区，延长超时时间，减少网络错误
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          
          # 增加 --depth 1 减少下载体积，最多自动重试3次，彻底解决网络波动导致的克隆失败
          for i in 1 2 3; do
            # 增加--shallow-submodules，让子模块也浅克隆，大幅减少下载体积，避免子模块克隆超时
            sudo git clone --recursive --depth 1 --shallow-submodules https://github.com/theos/theos.git /opt/theos && break
            echo "Theos clone failed, retrying in 5s... attempt $i/3"
            sleep 5
          done
          
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          # 最多自动重试3次克隆SDK，彻底解决网络波动导致的克隆失败
          for i in 1 2 3; do
            git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks && break
            echo "SDK clone failed, retrying in 5s... attempt $i/3"
            sleep 5
          done

      - name: Build Package
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 CODESIGN_IPA=0

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_DEB
          path: packages/*.deb
