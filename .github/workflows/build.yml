name: 编译 TrackHook 插件
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 固定使用macOS13环境，兼容所有Theos插件
    runs-on: macos-13
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ✅ 官方稳定Theos环境（无网络报错、无SDK错误）
      - name: 配置 Theos 开发环境
        uses: Tyilo/setup-theos@v2.0.1

      - name: 编译打包 deb
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: 上传编译好的 deb 包
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_Plugin
          path: packages/*.deb
