name: 编译Theos插件
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: 编译插件
        run: |
          make clean
          make package

      - name: 上传deb包
        uses: actions/upload-artifact@v4
        with:
          name: DebPackage
          path: packages/*.deb
