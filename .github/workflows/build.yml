name: Build Theos Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-version: master

      - name: Fix line endings & Build
        run: |
          # 修复 control 文件 Windows 换行符问题
          sed -i.bak 's/\r$//' control
          rm -f control.bak
          
          # 清理旧文件
          make clean 2>/dev/null || true
          rm -rf .theos packages 2>/dev/null || true
          
          # 编译打包
          make package FINALPACKAGE=1 CODESIGN_IPA=0 V=1
          
          # 检查是否生成 deb
          if [ ! -f packages/*.deb ]; then
            echo "FATAL: No deb file built!"
            exit 1
          fi
          
          ls -la packages/*.deb
        env:
          THEOS: ${{ github.workspace }}/theos
          _THEOS_PLATFORM_DPKG_DEB_COMPRESSION: gzip

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: Package
          path: packages/*.deb