name: Build TrackHook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node 警告
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # 使用 --depth 1 极大缩小下载量，减少 128 错误几率
          sudo git clone --recursive --depth 1 https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          # 增加失败重试逻辑
          for i in {1..3}; do
            git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks && break || sleep 10;
          done

      - name: Build Package
        run: |
          # 显式声明环境路径
          export THEOS=/opt/theos
          make package FINALPACKAGE=1 CODESIGN_IPA=0

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackHook_DEB
          path: packages/*.deb
